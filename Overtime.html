// =======================
// 숨김 관리
// =======================
let hiddenWorkers = new Set();

// =======================
// 목록 렌더링
// =======================
function renderWorkerList() {
  const list = defaultWorkers
    .filter(w => !hiddenWorkers.has(w.name))
    .map(w => `<option value="${w.name}">${w.name} (${w.band}/${w.dept})</option>`)
    .join("");

  document.getElementById("workersList").innerHTML = list;
}

// =======================
// 인원관리 테이블
// =======================
function renderWorkerTable() {
  let html = "<tr><th>성명</th><th>반</th><th>부서</th><th>관리</th></tr>";

  defaultWorkers.forEach(w => {
    const hidden = hiddenWorkers.has(w.name);

    html += `
      <tr style="${hidden ? 'opacity:0.4' : ''}">
        <td>${w.name}</td>
        <td>${w.band}</td>
        <td>${w.dept}</td>
        <td>
          <button onclick="toggleWorker('${w.name}')">
            ${hidden ? "열기" : "숨기기"}
          </button>
        </td>
      </tr>
    `;
  });

  document.getElementById("workerTable").innerHTML = html;
}

// =======================
// 숨기기 / 열기
// =======================
function toggleWorker(name) {
  if (hiddenWorkers.has(name)) {
    hiddenWorkers.delete(name);
  } else {
    hiddenWorkers.add(name);
  }

  renderWorkerTable();
}

// =======================
// 업데이트 버튼
// =======================
function updateWorkers() {
  renderWorkerList();
  alert("업데이트 완료");
}

// =======================

// =======================
function addWorker() {
  const name = document.getElementById("newName").value;
  const band = document.getElementById("newBand").value;
  const dept = document.getElementById("newDept").value;

  defaultWorkers.push({ name, band, dept });

  renderWorkerTable();
}
