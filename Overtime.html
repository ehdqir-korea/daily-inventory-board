<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연장근무 관리</title>

<style>
body {font-family: Arial; background:#f5f7fb; padding:20px;}
.box {background:#fff; padding:20px; border-radius:10px; max-width:600px;}
input,select,button {width:100%; padding:10px; margin-top:10px;}
button {background:#2563eb; color:#fff; border:none;}
#result {margin-top:20px; background:#eef; padding:15px;}
</style>

</head>
<body>

<div class="box">

<h2>연장근무 계산</h2>

날짜
<input type="date" id="date">

이름
<input type="text" id="name">

휴가자
<input type="text" id="absent">

<button onclick="calc()">계산</button>

<div id="result"></div>

</div>

<script>

// =============================
// 🔥 반변경 핵심 로직 (완성본)
// =============================

// 기본 패턴
const patterns = [
  ["갑","을","병"],
  ["을","병","갑"],
  ["병","갑","을"]
];

// 기준년도
const baseYear = 2026;

// 기준: 2026-01-01 = 갑을병
function getRotation(date){

  const year = date.getFullYear();

  // 연도 이동 (핵심)
  const yearShift = (year - baseYear) % 3;

  // 1월1일 기준 패턴
  let startPatternIndex = (0 + yearShift + 3) % 3;

  // 해당 날짜까지 경과일
  const start = new Date(year + "-01-01");
  const diff = Math.floor((date - start) / (1000*60*60*24));

  // 주차 계산
  const week = Math.floor(diff / 7);

  // 최종 패턴
  const finalIndex = (startPatternIndex + week) % 3;

  return {
    조근: patterns[finalIndex][0],
    중근: patterns[finalIndex][1],
    야근: patterns[finalIndex][2]
  };
}

// =============================
// 🔧 샘플 인원
// =============================

const workers = {
  "고우석": {band:"갑", dept:"제분"},
  "장진학": {band:"병", dept:"제분"},
  "김수현": {band:"을", dept:"제분"},
  "박영수": {band:"갑", dept:"제분"},
  "김인수": {band:"을", dept:"제분"}
};

// =============================
// 역할 찾기
// =============================
function getRole(rot, band){
  if(rot.조근==band) return "조근";
  if(rot.중근==band) return "중근";
  if(rot.야근==band) return "야근";
}

// =============================
// 계산
// =============================
function calc(){

  const date = new Date(document.getElementById("date").value);
  const name = document.getElementById("name").value;
  const absent = document.getElementById("absent").value;

  const rot = getRotation(date);

  const me = workers[name];
  const ab = workers[absent];

  if(!me || !ab){
    alert("이름 확인");
    return;
  }

  if(me.dept != ab.dept){
    alert("부서 다름");
    return;
  }

  const myRole = getRole(rot, me.band);
  const abRole = getRole(rot, ab.band);

  let result = "";

  // 🔥 핵심 로직 (너가 만든 규칙 그대로)
  if(abRole=="조근"){
    if(myRole=="중근"){
      result = "10:00~22:00 / 연장 5시간";
    }else{
      result = "22:00~10:00 / 연장 3시간";
    }
  }

  else if(abRole=="중근"){
    if(myRole=="조근"){
      result = "07:00~19:00 / 연장 4시간";
    }else{
      result = "19:00~07:00 / 연장 3시간";
    }
  }

  else if(abRole=="야근"){
    if(myRole=="중근"){
      result = "19:00~07:00 / 연장 5시간";
    }else{
      result = "07:00~19:00 / 연장 4시간";
    }
  }

  document.getElementById("result").innerHTML =
    "<b>반변경:</b> " + rot.조근+" / "+rot.중근+" / "+rot.야근 +
    "<br><br><b>결과:</b> " + result;
}

</script>

</body>
</html>
