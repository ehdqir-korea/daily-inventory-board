<!DOCTYPE html>
<!--
[PC UI 정리 버전]
- 계산 후 저장 버튼 중앙 정렬
- 구매 신청 열기 / 구매 신청 취소 버튼 우측 정렬
- 모바일 UI는 기존 구조 유지
-->
<!--
[전체 코드 TXT]
- 구매 신청 열기 옆에 구매 신청 취소 버튼 추가
- 담당자 입력 후 해당 담당자가 올린 물품 목록 조회
- 체크 후 선택 항목 취소 기능 추가
-->
<!--
[전체 코드 TXT]
- 휴가 상신 저장 버튼을 상단 수정 버튼 옆 작은 버튼으로 이동
- 휴가 조회 버튼 문구를 '휴가시작일 
.subsection{border:1px solid var(--line);border-radius:12px;padding:12px;margin-top:10px;background:#fafbff}
.subsection-title{font-weight:700;font-size:15px;margin-bottom:8px}
.mobile-item details{margin-top:8px}
.mobile-item summary{cursor:pointer;color:#1e3a8a;font-weight:700}
.mobile-item .summary-line{font-weight:700}
    @media (max-width:767px){
      .container{padding:12px}.card{padding:14px}.btn-row,.btn-row-4,.field-grid-2,.field-grid-3,.btn-row.single-wide{grid-template-columns:1fr}
      .subtitle,.notice{font-size:12px}.modal-content{padding:14px}.section-header{flex-direction:column;align-items:stretch}
      .header-actions{width:100%;display:grid;grid-template-columns:1fr 1fr}
      .inline-btn,.btn-small{width:100%}.desktop-table{display:none}.mobile-list{display:flex}
    }
    @media (min-width:768px){
      .desktop-table{display:block}.mobile-list{display:none}.scroll-hint{display:block}
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>연장근무 관리</h1>
    <p class="subtitle">휴가 상신, 연장근무 입력, 인원관리, 연장근무 히스토리, 구매신청을 한 화면에서 관리합니다.</p>

    <div class="card">
      <div class="section-header">
        <h2>1. 휴가 상신</h2>
        <div class="header-actions">
          <button class="btn-primary btn-small" id="saveLeaveBtn">저장</button>
          <button class="btn-secondary btn-small" id="openEditLeaveBtn">수정</button>
        </div>
      </div>

      <div class="subsection">
      <div class="subsection-title">휴가 입력</div>
      <label for="leaveStartDate">휴가 시작일</label>
      <input type="date" id="leaveStartDate" />

      <label for="leaveEndDate">휴가 종료일</label>
      <input type="date" id="leaveEndDate" />

      <div class="field-grid-3">
        <div>
          <label for="leaveName">이름</label>
          <input id="leaveName" data-worker-input="true" placeholder="이름 입력" />
        </div>
        <div>
          <label for="leaveDept">부서</label>
          <select id="leaveDept">
            <option value="">선택</option>
            <option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
            <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
          </select>
        </div>
        <div>
          <label for="leaveBand">반</label>
          <select id="leaveBand">
            <option value="">선택</option>
            <option value="갑">갑</option><option value="을">을</option><option value="병">병</option><option value="없음">없음</option>
          </select>
        </div>
      </div>

      <label for="leaveType">사유 유형</label>
      <select id="leaveType">
        <option value="" selected></option><option value="휴가">휴가</option><option value="연차">연차</option>
        <option value="오전반차">오전반차</option><option value="오후반차">오후반차</option>
      </select>

      <label for="leaveNote">비고</label>
      <input type="text" id="leaveNote" placeholder="예: 개인사유, 병원, 가정사" />

      <label for="leaveFile">첨부파일</label>
      <input type="file" id="leaveFile" accept="image/*" />
      <div id="leaveFileName" class="preview-file"></div>
      <img id="leavePreview" class="thumb" alt="휴가 첨부 미리보기" />

      </div>

      <div class="subsection">
      <div class="subsection-title">휴가 조회</div>
      <label for="leaveSearchDept">조회 부서</label>
      <select id="leaveSearchDept">
        <option value="전체">전체</option><option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
        <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
      </select>

      <label for="leaveSearchBand">조회 반</label>
      <select id="leaveSearchBand">
        <option value="전체">전체</option><option value="갑">갑</option><option value="을">을</option><option value="병">병</option><option value="없음">없음</option>
      </select>

      <div class="btn-row">
        <button class="btn-secondary" id="searchLeaveBtn">휴가시작일 기준 조회</button>
      </div>

      <div id="leaveMessage" class="message"></div>
      <div class="scroll-hint">PC에서는 표, 모바일에서는 카드형으로 표시됩니다.</div>
      <div class="table-wrap desktop-table"><table id="leaveTable"></table></div>
      <div id="leaveMobileList" class="mobile-list"></div>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>2. 연장근무 입력</h2>
        <div class="header-actions">
          <button class="btn-primary btn-small" id="previewBtn">계산</button>
        </div>
      </div>

      <label for="workDate">날짜</label>
      <input type="date" id="workDate" />

      <label for="workerName">본인 이름</label>
      <input id="workerName" data-worker-input="true" placeholder="이름 입력" />

      <label for="absentName">휴가자 이름</label>
      <input id="absentName" data-worker-input="true" placeholder='이름 입력 또는 "잔업특근"' />

      <datalist id="workersList"></datalist>

      <label for="absenceType">사유 유형</label>
      <select id="absenceType">
        <option value="" selected></option><option value="휴가">휴가</option><option value="연차">연차</option>
        <option value="오전반차">오전반차</option><option value="오후반차">오후반차</option>
      </select>

      <label for="note">비고</label>
      <input type="text" id="note" placeholder="예: 현장 요청, 제분, 설비대응" />

      <label for="workFile">첨부파일</label>
      <input type="file" id="workFile" accept="image/*" />
      <div id="workFileName" class="preview-file"></div>
      <img id="workPreview" class="thumb" alt="연장근무 첨부 미리보기" />

      <div class="btn-row single-wide">
        <button class="btn-secondary" id="saveBtn">계산 후 저장</button>
      </div>

      <div id="calcMessage" class="message"></div>
      <div id="calcResult" class="result-box" style="display:none;"></div>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>3. 일자별 연장근무 히스토리 조회</h2>
        <button class="btn-secondary inline-btn" id="openEditHistoryBtn">수정</button>
      </div>

      <label for="historyDate">조회 날짜</label><input type="date" id="historyDate" />
      <label for="historyDept">부서 선택</label>
      <select id="historyDept">
        <option value="전체">전체</option><option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
        <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
      </select>
      <button class="btn-primary" id="searchHistoryBtn">조회</button>

      <div id="historySummary" class="message"></div>
      <div class="scroll-hint">PC에서는 표, 모바일에서는 카드형으로 표시됩니다.</div>
      <div class="table-wrap desktop-table"><table id="historyTable"></table></div>
      <div id="historyMobileList" class="mobile-list"></div>
    </div>

    <div class="single-btn">
      <div class="header-actions">
        <button class="btn-primary inline-btn" id="openPurchaseBtn">구매 신청 열기</button>
        <button class="btn-danger inline-btn" id="openPurchaseCancelBtn">구매 신청 취소</button>
      </div>
    </div>

    <div class="card">
      <h2>4. 구매 신청 목록</h2>
      <p class="notice">구매 신청은 저장된 순서대로 계속 쌓이며, 마감은 비밀번호 1004 입력 후에만 가능합니다.</p>
      <div id="purchaseHistorySummary" class="message"></div>
      <div class="scroll-hint">PC에서는 표, 모바일에서는 카드형으로 표시됩니다.</div>
      <div class="table-wrap desktop-table"><table id="purchaseHistoryTable"></table></div>
      <div id="purchaseMobileList" class="mobile-list"></div>
    </div>

    <div class="card">
      <h2>5. 인원관리</h2>
      <p class="notice">인원 리스트는 처음에 숨김 상태입니다. 열기 버튼을 누르면 표시됩니다. 추가/삭제된 인원은 휴가 상신, 연장근무, 구매신청 이름 목록에 즉시 반영됩니다.</p>

      <label for="newName">이름</label><input type="text" id="newName" placeholder="예: 홍길동" />
      <label for="newBand">반</label>
      <select id="newBand"><option value="없음">없음</option><option value="갑">갑</option><option value="을">을</option><option value="병">병</option></select>
      <label for="newDept">부서</label>
      <select id="newDept">
        <option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
        <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
      </select>

      <div class="btn-row-4">
        <button class="btn-success" id="addWorkerBtn">인원 추가</button>
        <button class="btn-secondary" id="toggleWorkerPanelBtn">열기</button>
        <button class="btn-primary" id="updateWorkersBtn">업데이트</button>
        <button class="btn-secondary" id="openWorkerDeleteBtn">수정</button>
      </div>

      <div id="workerMessage" class="message"></div>
      <div class="table-wrap" id="workerTableWrap" style="display:none;"><table id="workerTable"></table></div>
    </div>

  </div>

  <div class="modal" id="purchaseModal">
    <div class="modal-content">
      <div class="modal-header"><h2>구매 신청</h2><button type="button" class="close-btn" id="closePurchaseBtn">닫기</button></div>
      <label for="purchaseDate">신청일</label><input type="date" id="purchaseDate" />
      <label for="purchaseApplicant">신청자</label><input id="purchaseApplicant" data-worker-input="true" placeholder="이름 입력" />
      <label for="purchaseItem">품목명</label><input type="text" id="purchaseItem" placeholder="예: 베어링, 장갑, 윤활유" />
      <label for="purchaseLink">링크</label><input type="text" id="purchaseLink" placeholder="예: 구매 링크 입력" />
      <label for="purchaseImage">사진 업로드</label><input type="file" id="purchaseImage" accept="image/*" />
      <div id="purchaseFileName" class="preview-file"></div><img id="purchasePreview" class="thumb" alt="미리보기" />
      <label for="purchaseNote">비고 (사용목적 및 사용부위)</label><textarea id="purchaseNote" placeholder="예: 정선 라인 베어링 교체용 / 시프터 하부"></textarea>
      <div class="btn-row"><button class="btn-primary" id="savePurchaseBtn">구매 신청 저장</button><button class="btn-secondary" id="clearPurchaseBtn">입력 초기화</button></div>
      <div id="purchaseMessage" class="message"></div>
    </div>
  </div>

  <div class="modal" id="passwordModal">
    <div class="modal-content">
      <div class="modal-header"><h2 id="passwordModalTitle">비밀번호 확인</h2><button type="button" class="close-btn" id="closePasswordBtn">닫기</button></div>
      <label for="editPassword">비밀번호</label><input type="password" id="editPassword" placeholder="비밀번호 입력" />
      <div class="btn-row"><button class="btn-primary" id="confirmPasswordBtn">확인</button><button class="btn-secondary" id="cancelPasswordBtn">취소</button></div>
      <div id="passwordMessage" class="message"></div>
    </div>
  </div>

  <div class="modal" id="editHistoryModal">
    <div class="modal-content">
      <div class="modal-header"><h2>연장근무 조회결과 수정</h2><button type="button" class="close-btn" id="closeEditHistoryBtn">닫기</button></div>
      <label for="editTargetDate">수정 대상 날짜</label><input type="date" id="editTargetDate" />
      <label for="editTargetDept">부서 선택</label>
      <select id="editTargetDept">
        <option value="전체">전체</option><option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
        <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
      </select>
      <button class="btn-primary" id="loadEditRowsBtn">조회결과 불러오기</button>
      <label for="editRowSelect">수정할 항목 선택</label><select id="editRowSelect"></select>
      <label for="editWorkerName">본인 이름</label><input id="editWorkerName" data-worker-input="true" placeholder="이름 입력" />
      <label for="editAbsentName">휴가자 이름</label><input id="editAbsentName" data-worker-input="true" placeholder="이름 입력" />
      <label for="editAbsenceType">사유 유형</label>
      <select id="editAbsenceType"><option value=""></option><option value="휴가">휴가</option><option value="연차">연차</option><option value="오전반차">오전반차</option><option value="오후반차">오후반차</option></select>
      <label for="editNote">비고</label><input type="text" id="editNote" placeholder="비고 입력" />
      <div class="field-grid-2">
        <div><label for="editManualTotalWork">총근무 (수기 수정)</label><input type="text" id="editManualTotalWork" placeholder="예: 07:00 ~ 19:00" /></div>
        <div><label for="editManualOvertime">연장근무시간 (수기 수정)</label><input type="text" id="editManualOvertime" placeholder="예: 15:00 ~ 19:00" /></div>
      </div>
      <label for="editManualOvertimeHours">연장시간(숫자, 수기 수정)</label><input type="number" step="0.5" id="editManualOvertimeHours" placeholder="예: 4 또는 3.5" />
      <div class="btn-row"><button class="btn-primary" id="saveEditHistoryBtn">수정 저장</button><button class="btn-danger" id="deleteEditHistoryBtn">선택 항목 삭제</button></div>
      <div id="editHistoryMessage" class="message"></div>
    </div>
  </div>

  <div class="modal" id="editLeaveModal">
    <div class="modal-content">
      <div class="modal-header"><h2>휴가 상신 수정</h2><button type="button" class="close-btn" id="closeEditLeaveBtn">닫기</button></div>
      <label for="editLeaveTargetDate">조회 날짜</label><input type="date" id="editLeaveTargetDate" />
      <label for="editLeaveSearchDept">조회 부서</label>
      <select id="editLeaveSearchDept">
        <option value="전체">전체</option><option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
        <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
      </select>
      <label for="editLeaveSearchBand">조회 반</label>
      <select id="editLeaveSearchBand"><option value="전체">전체</option><option value="갑">갑</option><option value="을">을</option><option value="병">병</option><option value="없음">없음</option></select>
      <button class="btn-primary" id="loadEditLeaveRowsBtn">조회결과 불러오기</button>
      <label for="editLeaveRowSelect">수정할 항목 선택</label><select id="editLeaveRowSelect"></select>

      <label for="editLeaveStartDate">휴가 시작일</label><input type="date" id="editLeaveStartDate" />
      <label for="editLeaveEndDate">휴가 종료일</label><input type="date" id="editLeaveEndDate" />
      <div class="field-grid-3">
        <div>
          <label for="editLeaveName">이름</label><input id="editLeaveName" data-worker-input="true" placeholder="이름 입력" />
        </div>
        <div>
          <label for="editLeaveDept">부서</label>
          <select id="editLeaveDept">
            <option value="">선택</option><option value="제분">제분</option><option value="정선">정선</option><option value="대포장">대포장</option>
            <option value="소포장">소포장</option><option value="품질관리">품질관리</option><option value="기술">기술</option><option value="생산2팀">생산2팀</option>
          </select>
        </div>
        <div>
          <label for="editLeaveBand">반</label><select id="editLeaveBand"><option value="">선택</option><option value="갑">갑</option><option value="을">을</option><option value="병">병</option><option value="없음">없음</option></select>
        </div>
      </div>
      <label for="editLeaveType">사유 유형</label>
      <select id="editLeaveType"><option value=""></option><option value="휴가">휴가</option><option value="연차">연차</option><option value="오전반차">오전반차</option><option value="오후반차">오후반차</option></select>
      <label for="editLeaveNote">비고</label><input type="text" id="editLeaveNote" placeholder="비고 입력" />
      <label for="editLeaveFile">첨부파일 변경</label><input type="file" id="editLeaveFile" accept="image/*" />
      <div id="editLeaveFileName" class="preview-file"></div><img id="editLeavePreview" class="thumb" alt="휴가 수정 첨부 미리보기" />
      <div class="btn-row"><button class="btn-primary" id="saveEditLeaveBtn">수정 저장</button><button class="btn-danger" id="deleteEditLeaveBtn">선택 항목 삭제</button></div>
      <div id="editLeaveMessage" class="message"></div>
    </div>
  </div>


  <div class="modal" id="purchaseCancelModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>구매 신청 취소</h2>
        <button type="button" class="close-btn" id="closePurchaseCancelBtn">닫기</button>
      </div>

      <label for="purchaseCancelApplicant">담당자</label>
      <input id="purchaseCancelApplicant" data-worker-input="true" placeholder="담당자 이름 입력" />

      <button class="btn-primary" id="loadPurchaseCancelBtn">담당자 물품 조회</button>

      <div id="purchaseCancelMessage" class="message"></div>

      <div class="table-wrap desktop-table">
        <table id="purchaseCancelTable"></table>
      </div>
      <div id="purchaseCancelMobileList" class="mobile-list"></div>

      <div class="btn-row">
        <button class="btn-danger" id="confirmPurchaseCancelBtn">선택 항목 취소</button>
      </div>
    </div>
  </div>

  <div class="modal" id="workerDeleteModal">
    <div class="modal-content">

    const timeTemplates = {"default": {"없음": {"조근": {"1": {"total": "전일 22:00 ~ 10:00", "overtime": "07:00 ~ 10:00", "overtimeHours": 3}, "2": {"total": "10:00 ~ 22:00", "overtime": "10:00 ~ 15:00", "overtimeHours": 5}}, "중근": {"1": {"total": "07:00 ~ 19:00", "overtime": "15:00 ~ 19:00", "overtimeHours": 4}, "2": {"total": "19:00 ~ 익일07:00", "overtime": "19:00 ~ 22:00", "overtimeHours": 3}}, "야근": {"1": {"total": "07:00 ~ 19:00", "overtime": "15:00 ~ 19:00", "overtimeHours": 4}, "2": {"total": "19:00 ~ 익일07:00", "overtime": "익일 02:00 ~ 익일 07:00", "overtimeHours": 5}}}, "오전반차": {"조근": {"total": "전일 22:00 ~ 10:00", "overtime": "07:00 ~ 10:00", "overtimeHours": 3}, "중근": {"total": "07:00 ~ 18:30", "overtime": "15:00 ~ 18:30", "overtimeHours": 3.5}}, "오후반차": {"조근": {"total": "11:00 ~ 22:00", "overtime": "11:00 ~ 15:00", "overtimeHours": 4}, "중근": {"total": "18:30 ~ 익일07:00", "overtime": "18:30 ~ 22:00", "overtimeHours": 3.5}}}, "monday": {"없음": {"조근": {"1": {"total": "07:00 ~ 19:00", "overtime": "14:00 ~ 19:00", "overtimeHours": 5}, "2": {"total": "19:00 ~ 익일07:00", "overtime": "19:00 ~ 22:00", "overtimeHours": 3}}, "중근": {"1": {"total": "07:00 ~ 19:00", "overtime": "15:00 ~ 19:00", "overtimeHours": 4}, "2": {"total": "19:00 ~ 익일07:00", "overtime": "19:00 ~ 22:00", "overtimeHours": 3}}, "야근": {"1": {"total": "07:00 ~ 19:00", "overtime": "14:00 ~ 19:00", "overtimeHours": 5}, "2": {"total": "19:00 ~ 익일07:00", "overtime": "익일 02:00 ~ 익일 07:00", "overtimeHours": 5}}}, "오전반차": {"조근": {"total": "전일 22:00 ~ 10:00", "overtime": "07:00 ~ 10:00", "overtimeHours": 3}, "중근": {"total": "07:00 ~ 18:30", "overtime": "15:00 ~ 18:30", "overtimeHours": 3.5}}, "오후반차": {"조근": {"total": "11:00 ~ 22:00", "overtime": "11:00 ~ 15:00", "overtimeHours": 4}, "중근": {"total": "18:30 ~ 익일07:00", "overtime": "18:30 ~ 22:00", "overtimeHours": 3.5}}}};
    const rotationPatterns = [["갑", "을", "병"], ["을", "병", "갑"], ["병", "갑", "을"]];
    const BASE_YEAR = 2025;
    const BASE_YEAR_FIRST_SUNDAY_PATTERN_INDEX = 1;

    function load(key, fallback){ try{ const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : fallback; }catch{ return fallback; } }
    function saveData(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
    function normalizeWorkers(workers){ return workers.map(w=>({name:String(w.name||"").trim(),band:String(w.band||"").trim(),dept:String(w.dept||"").trim()})).filter(w=>w.name&&w.dept); }
    function getWorkers(){ return normalizeWorkers(load(STORAGE_KEYS.workers, [])); }
    function setWorkers(workers){ saveData(STORAGE_KEYS.workers, normalizeWorkers(workers)); }
    function getHistory(){ return load(STORAGE_KEYS.history, []); }
    function setHistory(v){ saveData(STORAGE_KEYS.history, v); }
    function getPurchases(){ return load(STORAGE_KEYS.purchases, []); }
    function setPurchases(v){ saveData(STORAGE_KEYS.purchases, v); }
    function getLeave(){ return load(STORAGE_KEYS.leave, []); }
    function setLeave(v){ saveData(STORAGE_KEYS.leave, v); }

    function parseDate(dateStr){ const [y,m,d]=dateStr.split("-").map(Number); return new Date(y,m-1,d); }
    function formatDate(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
    function getDayName(dateStr){ const d=parseDate(dateStr); return ["일","월","화","수","목","금","토"][d.getDay()]; }
    function getFirstSundayOfYear(year){ const jan1=new Date(year,0,1); const offset=(7-jan1.getDay())%7; return new Date(year,0,1+offset); }
    function getYearStartPatternIndex(year){
      if(year===BASE_YEAR) return BASE_YEAR_FIRST_SUNDAY_PATTERN_INDEX;
      if(year>BASE_YEAR){ const prevLast=getLastPatternIndexOfYear(year-1); return (prevLast+1)%3; }
      const prevStart=getYearStartPatternIndex(year+1); return ((prevStart-1)%3+3)%3;
    }
    function getLastPatternIndexOfYear(year){
      const firstSunday=getFirstSundayOfYear(year); const lastDay=new Date(year,11,31);
      if(lastDay<firstSunday) return getLastPatternIndexOfYear(year-1);
      const diffDays=Math.floor((lastDay-firstSunday)/86400000); const weeksSince=Math.floor(diffDays/7);
      return (getYearStartPatternIndex(year)+weeksSince)%3;
    }
    function getRotationForDate(dateStr){
      const date=parseDate(dateStr); const year=date.getFullYear(); const firstSunday=getFirstSundayOfYear(year);
      let patternIndex;
      if(date<firstSunday) patternIndex=getLastPatternIndexOfYear(year-1);
      else { const diffDays=Math.floor((date-firstSunday)/86400000); const weeksSince=Math.floor(diffDays/7); patternIndex=(getYearStartPatternIndex(year)+weeksSince)%3; }
      const pattern=rotationPatterns[patternIndex];
      return {조근:pattern[0], 중근:pattern[1], 야근:pattern[2]};
    }
    function getRoleFromBand(rotation, band){ if(rotation.조근===band) return "조근"; if(rotation.중근===band) return "중근"; if(rotation.야근===band) return "야근"; return null; }

    function calcHoursFromSimpleRange(rangeText){
      if(!rangeText || !rangeText.includes("~")) return 0;
      const clean = rangeText.replace(/전일|익일/g,"").trim();
      const parts = clean.split("~").map(v=>v.trim());
      if(parts.length !== 2) return 0;
      const toMinutes = (txt) => {
        const [h,m] = txt.split(":").map(Number);
        if(Number.isNaN(h) || Number.isNaN(m)) return null;
        return h*60 + m;
      };
      let start = toMinutes(parts[0]);
      let end = toMinutes(parts[1]);
      if(start === null || end === null) return 0;
      if(end < start) end += 24*60;
      return (end - start) / 60;
    }

    function resolveAssignment(dateStr, absentRole, workerRole, absenceType){
      const isMonday=getDayName(dateStr)==="월";
      if(absenceType==="오전반차"||absenceType==="오후반차") return {targetRole:absentRole, sequenceNo:null};
      if(absentRole===workerRole) throw new Error("같은 역할끼리는 대체할 수 없습니다.");

      if(absentRole==="조근"){
        if(isMonday){
          if(workerRole==="중근") return {targetRole:"조근", sequenceNo:1};
          if(workerRole==="야근") return {targetRole:"조근", sequenceNo:2};
        }else{
          if(workerRole==="야근") return {targetRole:"조근", sequenceNo:1};
          if(workerRole==="중근") return {targetRole:"조근", sequenceNo:2};
        }
      }
      if(absentRole==="중근"){
        if(workerRole==="조근") return {targetRole:"중근", sequenceNo:1};
        if(workerRole==="야근") return {targetRole:"중근", sequenceNo:2};
      }
      if(absentRole==="야근"){
        if(workerRole==="조근") return {targetRole:"중근", sequenceNo:1};
        if(workerRole==="중근") return {targetRole:"야근", sequenceNo:2};
      }
      throw new Error("대체근무 조합을 찾을 수 없습니다.");
    }

    function getTimeTemplate(dateStr, absenceType, targetRole, sequenceNo){
      const templateSet = getDayName(dateStr)==="월" ? timeTemplates.monday : timeTemplates.default;
      if(absenceType==="오전반차"||absenceType==="오후반차"){
        const row=templateSet[absenceType][targetRole];
        if(!row) throw new Error("반차 시간표를 찾을 수 없습니다.");
        return row;
      }
      const row=templateSet["없음"][targetRole][sequenceNo];
      if(!row) throw new Error("일반 시간표를 찾을 수 없습니다.");
      return row;
    }

    function buildActionText(absentName, absenceType){
      if(absentName==="잔업특근") return "잔업특근";
      return `${absentName}${absenceType ? " "+absenceType : ""}대체`;
    }

    function calculateWorkResult({date, workerName, absentName, absenceType, note, imageData=""}){
      if(!date) throw new Error("날짜를 입력해 주세요.");
      if(!workerName) throw new Error("본인 이름을 입력해 주세요.");
      if(!absentName) throw new Error("휴가자 이름을 입력해 주세요.");

      const workers=getWorkers();
      const worker=workers.find(w=>w.name===workerName);
      if(!worker) throw new Error("본인 이름이 인원목록에 없습니다.");

      if(absentName==="잔업특근"){
        const rotation=getRotationForDate(date);
        const totalWork = "08:00 ~ 16:00";
        return {date, dayName:getDayName(date), dept:worker.dept, workerName:worker.name, workerBand:worker.band, absentName:"잔업특근", absentBand:"-", absenceType, note, imageData, rotation, workerRole:worker.band==="없음"?"-":(getRoleFromBand(rotation, worker.band)||"-"), absentRole:"-", replacementRole:"-", sequenceNo:"-", totalWork, overtime:totalWork, overtimeHours:calcHoursFromSimpleRange(totalWork), actionText:"잔업특근"};
      }

      const absent=workers.find(w=>w.name===absentName);
      if(!absent) throw new Error('휴가자 이름은 인원목록에 있는 이름만 입력 가능하며, 예외는 "잔업특근"만 가능합니다.');
      if(worker.dept!==absent.dept) throw new Error("같은 부서끼리만 대체 가능합니다.");

      const rotation=getRotationForDate(date);
      const workerRole=worker.band==="없음"?null:getRoleFromBand(rotation, worker.band);
      const absentRole=absent.band==="없음"?null:getRoleFromBand(rotation, absent.band);
      if(!workerRole||!absentRole) throw new Error("반변경 계산에 실패했습니다. 반이 '없음'인 경우 일반 대체근무 계산이 불가능합니다.");

      const assignment=resolveAssignment(date, absentRole, workerRole, absenceType);
      const tpl=getTimeTemplate(date, absenceType, assignment.targetRole, assignment.sequenceNo);

      return {date, dayName:getDayName(date), dept:worker.dept, workerName:worker.name, workerBand:worker.band, absentName:absent.name, absentBand:absent.band, absenceType, note, imageData, rotation, workerRole, absentRole, replacementRole:assignment.targetRole, sequenceNo:assignment.sequenceNo, totalWork:tpl.total, overtime:tpl.overtime, overtimeHours:tpl.overtimeHours, actionText:buildActionText(absent.name, absenceType)};
    }

    function setMessage(targetId, message, type){ const el=document.getElementById(targetId); el.textContent=message; el.className=`message ${type}`; }
    function readFileAsDataURL(file){ return new Promise((resolve,reject)=>{ if(!file){ resolve(""); return; } const reader=new FileReader(); reader.onload=()=>resolve(reader.result); reader.onerror=reject; reader.readAsDataURL(file); }); }
    function setFilePreview(fileInputId, previewId, fileNameId){
      const input=document.getElementById(fileInputId), preview=document.getElementById(previewId), fileName=document.getElementById(fileNameId);
      input.addEventListener("change", async e=>{
        const file=e.target.files[0];
        if(!file){ if(fileName) fileName.textContent=""; preview.src=""; preview.style.display="none"; return; }
        if(fileName) fileName.textContent=`선택 파일: ${file.name}`;
        const dataUrl=await readFileAsDataURL(file); preview.src=dataUrl; preview.style.display="block";
      });
    }

      const dept=document.getElementById("historyDept").value;
      if(!date){ setMessage("historySummary","조회 날짜를 입력해 주세요.","error"); return; }
      renderHistory(date, dept);
    });

    document.getElementById("openPurchaseBtn").addEventListener("click", openPurchaseModal);
    document.getElementById("openPurchaseCancelBtn").addEventListener("click", openPurchaseCancelModal);
    document.getElementById("closePurchaseBtn").addEventListener("click", closePurchaseModal);
    document.getElementById("closePurchaseCancelBtn").addEventListener("click", closePurchaseCancelModal);
    document.getElementById("clearPurchaseBtn").addEventListener("click", clearPurchaseForm);
    document.getElementById("loadPurchaseCancelBtn").addEventListener("click", ()=>{
      const applicant = document.getElementById("purchaseCancelApplicant").value.trim();
      renderPurchaseCancelTable(applicant);
    });
    document.getElementById("confirmPurchaseCancelBtn").addEventListener("click", ()=>{
      const checks = [...document.querySelectorAll(".purchase-cancel-check:checked")];
      if(checks.length===0){
        setMessage("purchaseCancelMessage","취소할 항목을 체크해 주세요.","error");
        return;
      }
      const indexes = checks.map(x=>Number(x.value)).sort((a,b)=>b-a);
      const items = getPurchases();
      indexes.forEach(idx=>{
        if(idx>=0 && idx<items.length) items.splice(idx,1);
      });
      setPurchases(items);
      renderPurchaseHistory();
      const applicant = document.getElementById("purchaseCancelApplicant").value.trim();
      renderPurchaseCancelTable(applicant);
      setMessage("purchaseCancelMessage","선택 항목을 취소했습니다.","success");
    });

    document.getElementById("savePurchaseBtn").addEventListener("click", async ()=>{
      try{
        const date=document.getElementById("purchaseDate").value;
        const applicant=document.getElementById("purchaseApplicant").value.trim();
        const itemName=document.getElementById("purchaseItem").value.trim();
        const link=document.getElementById("purchaseLink").value.trim();
        const note=document.getElementById("purchaseNote").value.trim();
        const file=document.getElementById("purchaseImage").files[0];
        if(!date) throw new Error("신청일을 입력해 주세요.");
        if(!applicant) throw new Error("신청자를 입력해 주세요.");
        if(!itemName) throw new Error("품목명을 입력해 주세요.");
        if(!getWorkers().some(w=>w.name===applicant)) throw new Error("신청자는 인원관리 목록에 있는 이름만 사용할 수 있습니다.");
        const imageData=file ? await readFileAsDataURL(file) : "";
        const purchases=getPurchases();
        purchases.push({date,applicant,itemName,link,note,imageData}); setPurchases(purchases);
        renderPurchaseHistory();
        setMessage("purchaseMessage","구매 신청을 저장했습니다.","success");
      }catch(e){ setMessage("purchaseMessage", e.message, "error"); }
    });

    document.getElementById("openEditHistoryBtn").addEventListener("click", ()=>openPasswordModal("조회결과 수정 인증","history-edit"));
    document.getElementById("openEditLeaveBtn").addEventListener("click", ()=>openPasswordModal("휴가 상신 수정 인증","leave-edit"));
    document.getElementById("closePasswordBtn").addEventListener("click", closePasswordModal);
    document.getElementById("cancelPasswordBtn").addEventListener("click", closePasswordModal);

    document.getElementById("confirmPasswordBtn").addEventListener("click", ()=>{
      const pw=document.getElementById("editPassword").value;
      if(pw!==EDIT_PASSWORD){ setMessage("passwordMessage","비밀번호가 일치하지 않습니다.","error"); return; }
      const action=passwordAction, purchaseIndex=pendingPurchaseCloseIndex, leaveIndex=pendingLeaveCloseIndex;
      closePasswordModal();
      if(action==="history-edit") openEditHistoryModal();
      else if(action==="worker-delete") openWorkerDeleteModal();
      else if(action==="purchase-close" && purchaseIndex!==null) closePurchaseItem(purchaseIndex);
      else if(action==="leave-edit") openEditLeaveModal();
      else if(action==="leave-close" && leaveIndex!==null) closeLeaveItem(leaveIndex);
    });

    document.getElementById("closeEditHistoryBtn").addEventListener("click", closeEditHistoryModal);
    document.getElementById("closeEditLeaveBtn").addEventListener("click", closeEditLeaveModal);
    document.getElementById("closeWorkerDeleteBtn").addEventListener("click", closeWorkerDeleteModal);

    document.getElementById("loadEditRowsBtn").addEventListener("click", ()=>{
      const date=document.getElementById("editTargetDate").value, dept=document.getElementById("editTargetDept").value;
      if(!date){ setMessage("editHistoryMessage","수정 대상 날짜를 입력해 주세요.","error"); return; }
      populateEditRows(date, dept);
    });
    document.getElementById("editRowSelect").addEventListener("change", e=>fillEditFormByIndex(e.target.value));

    document.getElementById("saveEditHistoryBtn").addEventListener("click", ()=>{
      try{
        const selectedIndex=document.getElementById("editRowSelect").value;
        if(selectedIndex==="") throw new Error("수정할 항목을 선택해 주세요.");
        const date=document.getElementById("editTargetDate").value;
        const workerName=document.getElementById("editWorkerName").value.trim();
        const absentName=document.getElementById("editAbsentName").value.trim();
        const absenceType=document.getElementById("editAbsenceType").value;
        const note=document.getElementById("editNote").value.trim();
        const history=getHistory();
        const oldRow=history[Number(selectedIndex)];
        if(!oldRow) throw new Error("대상 데이터를 찾을 수 없습니다.");

        const recalculated=calculateWorkResult({date,workerName,absentName,absenceType,note,imageData:oldRow.imageData||""});
        const manualTotalWork=document.getElementById("editManualTotalWork").value.trim();
        const manualOvertime=document.getElementById("editManualOvertime").value.trim();
        const manualOvertimeHours=document.getElementById("editManualOvertimeHours").value.trim();
        if(manualTotalWork) recalculated.totalWork=manualTotalWork;
        if(manualOvertime) recalculated.overtime=manualOvertime;
        if(manualOvertimeHours!=="") recalculated.overtimeHours=Number(manualOvertimeHours);

        history[Number(selectedIndex)] = recalculated;
        setHistory(history);
        const dept=document.getElementById("editTargetDept").value;
        populateEditRows(date, dept);
        document.getElementById("editRowSelect").value=String(selectedIndex);
        fillEditFormByIndex(String(selectedIndex));
        if(document.getElementById("historyDate").value===date) renderHistory(date, document.getElementById("historyDept").value);
        setMessage("editHistoryMessage","조회결과를 수정했습니다.","success");
      }catch(e){ setMessage("editHistoryMessage", e.message, "error"); }
    });

    document.getElementById("deleteEditHistoryBtn").addEventListener("click", ()=>{
      try{
        const selectedIndex=document.getElementById("editRowSelect").value;
        const date=document.getElementById("editTargetDate").value;
        if(selectedIndex==="") throw new Error("삭제할 항목을 선택해 주세요.");
        const history=getHistory(); history.splice(Number(selectedIndex),1); setHistory(history);
        const dept=document.getElementById("editTargetDept").value;
        populateEditRows(date, dept);
        document.getElementById("editWorkerName").value="";
        document.getElementById("editAbsentName").value="";
        document.getElementById("editAbsenceType").value="";
        document.getElementById("editNote").value="";
        document.getElementById("editManualTotalWork").value="";
        document.getElementById("editManualOvertime").value="";
        document.getElementById("editManualOvertimeHours").value="";
        if(document.getElementById("historyDate").value===date) renderHistory(date, document.getElementById("historyDept").value);
        setMessage("editHistoryMessage","선택 항목을 삭제했습니다.","success");
      }catch(e){ setMessage("editHistoryMessage", e.message, "error"); }
    });

    document.getElementById("loadEditLeaveRowsBtn").addEventListener("click", ()=>{
      const date=document.getElementById("editLeaveTargetDate").value;
      const dept=document.getElementById("editLeaveSearchDept").value;
      const band=document.getElementById("editLeaveSearchBand").value;
      if(!date){ setMessage("editLeaveMessage","조회 날짜를 입력해 주세요.","error"); return; }
      populateEditLeaveRows(date, dept, band);
    });
    document.getElementById("editLeaveRowSelect").addEventListener("change", e=>fillEditLeaveFormByIndex(e.target.value));

    document.getElementById("saveEditLeaveBtn").addEventListener("click", async ()=>{
      try{
        const selectedIndex=document.getElementById("editLeaveRowSelect").value;
        if(selectedIndex==="") throw new Error("수정할 항목을 선택해 주세요.");
        const startDate=document.getElementById("editLeaveStartDate").value;
        const endDate=document.getElementById("editLeaveEndDate").value;
        const name=document.getElementById("editLeaveName").value.trim();
        const dept=document.getElementById("editLeaveDept").value;
        const band=document.getElementById("editLeaveBand").value;
        const type=document.getElementById("editLeaveType").value;
        const note=document.getElementById("editLeaveNote").value.trim();
        const file=document.getElementById("editLeaveFile").files[0];

        if(!startDate) throw new Error("휴가 시작일을 입력해 주세요.");
        if(!endDate) throw new Error("휴가 종료일을 입력해 주세요.");
        if(endDate < startDate) throw new Error("휴가 종료일은 시작일보다 빠를 수 없습니다.");
        if(!name) throw new Error("이름을 입력해 주세요.");
        if(!dept) throw new Error("부서를 선택해 주세요.");
        if(!band) throw new Error("반을 선택해 주세요.");
        if(!type) throw new Error("사유 유형을 선택해 주세요.");
        if(!getWorkers().some(w=>w.name===name)) throw new Error("이름은 인원관리 목록에 있는 이름만 사용할 수 있습니다.");

        const rows=getLeave();
        const oldRow=rows[Number(selectedIndex)];
        if(!oldRow) throw new Error("대상 데이터를 찾을 수 없습니다.");
        const imageData=file ? await readFileAsDataURL(file) : (oldRow.imageData || "");

        rows[Number(selectedIndex)] = {startDate,endDate,name,dept,band,type,note,imageData,submittedAt:oldRow.submittedAt || new Date().toLocaleString("ko-KR",{hour12:false})};
        setLeave(rows);
        populateEditLeaveRows(document.getElementById("editLeaveTargetDate").value, document.getElementById("editLeaveSearchDept").value, document.getElementById("editLeaveSearchBand").value);
        document.getElementById("editLeaveRowSelect").value=String(selectedIndex);
        fillEditLeaveFormByIndex(String(selectedIndex));
        const currentQueryDate = document.getElementById("leaveStartDate").value;
        if(currentQueryDate && startDate <= currentQueryDate && currentQueryDate <= endDate) renderLeaveTable(currentQueryDate);
        setMessage("editLeaveMessage","휴가 상신 내역을 수정했습니다.","success");
      }catch(e){ setMessage("editLeaveMessage", e.message, "error"); }
    });

    document.getElementById("deleteEditLeaveBtn").addEventListener("click", ()=>{
      try{
        const selectedIndex=document.getElementById("editLeaveRowSelect").value;
        const targetDate=document.getElementById("editLeaveTargetDate").value;
        if(selectedIndex==="") throw new Error("삭제할 항목을 선택해 주세요.");
        const rows=getLeave(); rows.splice(Number(selectedIndex),1); setLeave(rows);
        populateEditLeaveRows(targetDate, document.getElementById("editLeaveSearchDept").value, document.getElementById("editLeaveSearchBand").value);
        document.getElementById("editLeaveStartDate").value="";
        document.getElementById("editLeaveEndDate").value="";
        document.getElementById("editLeaveName").value="";
        document.getElementById("editLeaveDept").value="";
        document.getElementById("editLeaveBand").value="";
        document.getElementById("editLeaveType").value="";
        document.getElementById("editLeaveNote").value="";
        document.getElementById("editLeaveFile").value="";
        document.getElementById("editLeaveFileName").textContent="";
        document.getElementById("editLeavePreview").src="";
        document.getElementById("editLeavePreview").style.display="none";
        if(document.getElementById("leaveStartDate").value===targetDate) renderLeaveTable(targetDate);
        setMessage("editLeaveMessage","선택 항목을 삭제했습니다.","success");
      }catch(e){ setMessage("editLeaveMessage", e.message, "error"); }
    });

    document.getElementById("purchaseModal").addEventListener("click", e=>{ if(e.target.id==="purchaseModal") closePurchaseModal(); });
    document.getElementById("purchaseCancelModal").addEventListener("click", e=>{ if(e.target.id==="purchaseCancelModal") closePurchaseCancelModal(); });
    document.getElementById("passwordModal").addEventListener("click", e=>{ if(e.target.id==="passwordModal") closePasswordModal(); });
    document.getElementById("editHistoryModal").addEventListener("click", e=>{ if(e.target.id==="editHistoryModal") closeEditHistoryModal(); });
    document.getElementById("editLeaveModal").addEventListener("click", e=>{ if(e.target.id==="editLeaveModal") closeEditLeaveModal(); });
    document.getElementById("workerDeleteModal").addEventListener("click", e=>{ if(e.target.id==="workerDeleteModal") closeWorkerDeleteModal(); });

    function init(){
      const savedWorkers=getWorkers();
      if(!savedWorkers.length) setWorkers(DEFAULT_WORKERS_DATA);
      renderWorkerList();
      renderWorkerTable();
      const today=formatDate(new Date());
      document.getElementById("leaveStartDate").value=today;
      document.getElementById("leaveEndDate").value=today;
      document.getElementById("workDate").value=today;
      document.getElementById("historyDate").value=today;
      document.getElementById("purchaseDate").value=today;
      document.getElementById("workerTableWrap").style.display="none";
      document.getElementById("toggleWorkerPanelBtn").textContent="열기";
      renderLeaveTable(today);
      renderHistory(today, "전체");
      renderPurchaseHistory();
    }

    setFilePreview("leaveFile","leavePreview","leaveFileName");
    setFilePreview("workFile","workPreview","workFileName");
    setFilePreview("purchaseImage","purchasePreview","purchaseFileName");
    setFilePreview("editLeaveFile","editLeavePreview","editLeaveFileName");
    init();
  </script>
</body>
</html>
