<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>연장근무 관리</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --line: #d9dee8;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --soft: #eef2ff;
      --overlay: rgba(15, 23, 42, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, "Malgun Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.04);
    }

    h1, h2, h3 {
      margin: 0 0 12px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .section-header h2 {
      margin: 0;
    }

    .inline-btn {
      width: auto;
      min-width: 100px;
      margin-top: 0;
      padding: 10px 14px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
      margin-top: 10px;
    }

    input, select, button, textarea {
      width: 100%;
      font: inherit;
      min-height: 44px;
    }

    input, select, textarea {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      font-weight: 700;
      margin-top: 10px;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: var(--soft);
      color: #1e3a8a;
    }

    .btn-success {
      background: #dcfce7;
      color: #166534;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-row-4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .single-btn {
      margin-top: 10px;
    }

    .result-box {
      background: #f8fafc;
      border: 1px dashed var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-top: 12px;
      line-height: 1.7;
      font-size: 14px;
    }

    .message {
      margin-top: 10px;
      font-weight: 700;
      font-size: 14px;
    }

    .message.success { color: var(--success); }
    .message.error { color: var(--danger); }

    .notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      font-size: 14px;
      background: #fff;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px 8px;
      text-align: center;
      vertical-align: middle;
      white-space: normal;
      word-break: keep-all;
    }

    th {
      background: #f8fafc;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: var(--overlay);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      width: min(760px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.18);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .close-btn {
      width: auto;
      min-width: 44px;
      margin-top: 0;
      background: #e5e7eb;
      color: #111827;
      padding: 10px 12px;
    }

    .thumb {
      max-width: 180px;
      max-height: 180px;
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-top: 10px;
      display: none;
      object-fit: cover;
      background: #fff;
    }

    .preview-file {
      color: var(--muted);
      font-size: 13px;
      margin-top: 8px;
    }

    .purchase-img {
      max-width: 100px;
      max-height: 100px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    .link-cell {
      max-width: 220px;
      word-break: break-all;
      margin: 0 auto;
    }

    .hidden-box {
      display: none;
    }

    @media (max-width: 640px) {
      .container { padding: 12px; }
      .card { padding: 14px; }
      .btn-row, .btn-row-4 { grid-template-columns: 1fr; }
      .subtitle, .notice { font-size: 12px; }
      table { min-width: 760px; font-size: 13px; }
      .modal-content { padding: 14px; }
      .section-header { flex-direction: column; align-items: stretch; }
      .inline-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>연장근무 관리</h1>
    <p class="subtitle">날짜, 본인 이름, 휴가자 이름을 입력하면 반변경에 따라 작업시간과 연장시간을 계산합니다.</p>

    <div class="card">
      <h2>1. 연장근무 입력</h2>

      <label for="workDate">날짜</label>
      <input type="date" id="workDate" />

      <label for="workerName">본인 이름</label>
      <input list="workersList" id="workerName" placeholder="이름 입력 또는 선택" />

      <label for="absentName">휴가자 이름</label>
      <input list="workersList" id="absentName" placeholder="이름 입력 또는 선택" />

      <datalist id="workersList"></datalist>

      <label for="absenceType">사유 유형</label>
      <select id="absenceType">
        <option value="휴가">휴가</option>
        <option value="연차">연차</option>
        <option value="오전반차">오전반차</option>
        <option value="오후반차">오후반차</option>
      </select>

      <label for="note">비고</label>
      <input type="text" id="note" placeholder="예: 현장 요청, 제분, 설비대응" />

      <div class="btn-row">
        <button class="btn-primary" id="previewBtn">계산</button>
        <button class="btn-secondary" id="saveBtn">계산 후 저장</button>
      </div>

      <div id="calcMessage" class="message"></div>
      <div id="calcResult" class="result-box" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>2. 인원관리</h2>
      <p class="notice">인원 추가 후 업데이트를 누르면 입력 목록에 반영됩니다. 숨기기/열기는 인원관리 영역 전체를 접고 펼치는 기능입니다.</p>

      <label for="newName">이름</label>
      <input type="text" id="newName" placeholder="예: 홍길동" />

      <label for="newBand">반</label>
      <select id="newBand">
        <option value="갑">갑</option>
        <option value="을">을</option>
        <option value="병">병</option>
      </select>

      <label for="newDept">부서</label>
      <select id="newDept">
        <option value="제분">제분</option>
        <option value="정선">정선</option>
        <option value="대포장">대포장</option>
        <option value="소포장">소포장</option>
        <option value="품질관리">품질관리</option>
        <option value="기술">기술</option>
        <option value="생산2팀">생산2팀</option>
      </select>

      <div class="btn-row-4">
        <button class="btn-success" id="addWorkerBtn">인원 추가</button>
        <button class="btn-secondary" id="toggleWorkerPanelBtn">숨기기</button>
        <button class="btn-primary" id="updateWorkersBtn">업데이트</button>
        <button class="btn-secondary" id="resetWorkersBtn">기본 인원 불러오기</button>
      </div>

      <div id="workerMessage" class="message"></div>

      <div class="table-wrap" id="workerTableWrap">
        <table id="workerTable"></table>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h2>3. 일자별 연장근무 히스토리 조회</h2>
        <button class="btn-secondary inline-btn" id="openEditHistoryBtn">수정</button>
      </div>

      <label for="historyDate">조회 날짜</label>
      <input type="date" id="historyDate" />

      <button class="btn-primary" id="searchHistoryBtn">조회</button>

      <div id="historySummary" class="message"></div>

      <div class="table-wrap">
        <table id="historyTable"></table>
      </div>
    </div>

    <div class="single-btn">
      <button class="btn-primary" id="openPurchaseBtn">구매 신청 열기</button>
    </div>

    <div class="card">
      <h2>4. 구매 신청 목록</h2>
      <p class="notice">구매 신청은 저장된 순서대로 계속 쌓이며, 각 항목의 마감 버튼으로 개별 종료합니다.</p>

      <div id="purchaseHistorySummary" class="message"></div>

      <div class="table-wrap">
        <table id="purchaseHistoryTable"></table>
      </div>
    </div>
  </div>

  <div class="modal" id="purchaseModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>구매 신청</h2>
        <button type="button" class="close-btn" id="closePurchaseBtn">닫기</button>
      </div>

      <label for="purchaseDate">신청일</label>
      <input type="date" id="purchaseDate" />

      <label for="purchaseApplicant">신청자</label>
      <input list="workersList" id="purchaseApplicant" placeholder="이름 입력 또는 선택" />

      <label for="purchaseItem">품목명</label>
      <input type="text" id="purchaseItem" placeholder="예: 베어링, 장갑, 윤활유" />

      <label for="purchaseLink">링크</label>
      <input type="text" id="purchaseLink" placeholder="예: 구매 링크 입력" />

      <label for="purchaseImage">사진 업로드</label>
      <input type="file" id="purchaseImage" accept="image/*" />
      <div id="purchaseFileName" class="preview-file"></div>
      <img id="purchasePreview" class="thumb" alt="미리보기" />

      <label for="purchaseNote">비고 (사용목적 및 사용부위)</label>
      <textarea id="purchaseNote" placeholder="예: 정선 라인 베어링 교체용 / 시프터 하부"></textarea>

      <div class="btn-row">
        <button class="btn-primary" id="savePurchaseBtn">구매 신청 저장</button>
        <button class="btn-secondary" id="clearPurchaseBtn">입력 초기화</button>
      </div>

      <div id="purchaseMessage" class="message"></div>
    </div>
  </div>

  <div class="modal" id="passwordModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>조회결과 수정 인증</h2>
        <button type="button" class="close-btn" id="closePasswordBtn">닫기</button>
      </div>

      <label for="editPassword">비밀번호</label>
      <input type="password" id="editPassword" placeholder="비밀번호 입력" />

      <div class="btn-row">
        <button class="btn-primary" id="confirmPasswordBtn">확인</button>
        <button class="btn-secondary" id="cancelPasswordBtn">취소</button>
      </div>

      <div id="passwordMessage" class="message"></div>
    </div>
  </div>

  <div class="modal" id="editHistoryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>연장근무 조회결과 수정</h2>
        <button type="button" class="close-btn" id="closeEditHistoryBtn">닫기</button>
      </div>

      <label for="editTargetDate">수정 대상 날짜</label>

      <button class="btn-primary" id="loadEditRowsBtn">조회결과 불러오기</button>

      <label for="editRowSelect">수정할 항목 선택</label>
      <select id="editRowSelect"></select>

      <label for="editWorkerName">본인 이름</label>
      <input list="workersList" id="editWorkerName" placeholder="이름 입력 또는 선택" />

      <label for="editAbsentName">휴가자 이름</label>
      <input list="workersList" id="editAbsentName" placeholder="이름 입력 또는 선택" />

      <label for="editAbsenceType">사유 유형</label>
      <select id="editAbsenceType">
        <option value="휴가">휴가</option>
        <option value="연차">연차</option>
        <option value="오전반차">오전반차</option>
        <option value="오후반차">오후반차</option>
      </select>

      <label for="editNote">비고</label>
      <input type="text" id="editNote" placeholder="비고 입력" />

      <div class="btn-row">
        <button class="btn-primary" id="saveEditHistoryBtn">수정 저장</button>
        <button class="btn-danger" id="deleteEditHistoryBtn">선택 항목 삭제</button>
      </div>

      <div id="editHistoryMessage" class="message"></div>
    </div>
  </div>

    const rotationPatterns = [
      ["갑", "을", "병"],
      ["을", "병", "갑"],

    ];

    function load(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveData(key, value) {

    function parseDate(dateStr) {
      const [y, m, d] = dateStr.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function getDayName(dateStr) {
      const d = parseDate(dateStr);
      return ["일", "월", "화", "수", "목", "금", "토"][d.getDay()];
    }

    function getWeekNumMonday(dateStr) {
      const date = parseDate(dateStr);
      const year = date.getFullYear();
      const jan1 = new Date(year, 0, 1);
      const jan1Day = jan1.getDay();
      const mondayBasedJan1 = jan1Day === 0 ? 7 : jan1Day;
      const diffDays = Math.floor((date - jan1) / 86400000);
      return Math.floor((diffDays + mondayBasedJan1 - 1) / 7) + 1;
    }

    function getRotationForDate(dateStr) {
      const year = parseDate(dateStr).getFullYear();
      const baseYear = 2026;
      const startPatternIndex = ((year - baseYear) % 3 + 3) % 3;
      const weekNum = getWeekNumMonday(dateStr);
      const patternIndex = (startPatternIndex + weekNum) % 3;
      const pattern = rotationPatterns[patternIndex];

      return {
        조근: pattern[0],
        중근: pattern[1],
        야근: pattern[2]
      };
    }

    function getRoleFromBand(rotation, band) {
      if (rotation.조근 === band) return "조근";
      if (rotation.중근 === band) return "중근";
      if (rotation.야근 === band) return "야근";
      return null;
    }

    function resolveAssignment(dateStr, absentRole, workerRole, absenceType) {
      const dayName = getDayName(dateStr);

      if (absenceType === "오전반차" || absenceType === "오후반차") {
        return {
          targetRole: absentRole,
          sequenceNo: null
        };
      }

      if (absentRole === "조근") {
        if (dayName === "월") {
          if (workerRole === "중근") {
            return { targetRole: "조근", sequenceNo: 1 };
          }
          if (workerRole === "야근") {
            return { targetRole: "조근", sequenceNo: 2 };
          }
        } else {
          if (workerRole === "야근") {
            return { targetRole: "조근", sequenceNo: 1 };
          }
          if (workerRole === "중근") {
            return { targetRole: "조근", sequenceNo: 2 };
          }
        }
      }

      if (absentRole === "중근") {
        if (workerRole === "조근") {
          return { targetRole: "중근", sequenceNo: 1 };
        }
        if (workerRole === "야근") {
          return { targetRole: "중근", sequenceNo: 2 };
        }
      }

      if (absentRole === "야근") {
        if (workerRole === "조근") {
          return { targetRole: "중근", sequenceNo: 1 };
        }
        if (workerRole === "중근") {
          return { targetRole: "야근", sequenceNo: 2 };
        }
      }

      throw new Error("대체근무 조합을 찾을 수 없습니다.");
    }

    function getTimeTemplate(dateStr, absenceType, targetRole, sequenceNo) {
      const dayName = getDayName(dateStr);
      const templateSet = dayName === "월" ? timeTemplates.monday : timeTemplates.default;

      if (absenceType === "오전반차" || absenceType === "오후반차") {
        const row = templateSet[absenceType][targetRole];
        if (!row) throw new Error("반차 시간표를 찾을 수 없습니다.");
        return row;
      }

      const row = templateSet["없음"][targetRole][sequenceNo];
      if (!row) throw new Error("일반 시간표를 찾을 수 없습니다.");
      return row;
    }

    function calculateWorkResult({ date, workerName, absentName, absenceType, note }) {
      if (!date) throw new Error("날짜를 입력해 주세요.");
      if (!workerName) throw new Error("본인 이름을 입력해 주세요.");
      if (!absentName) throw new Error("휴가자 이름을 입력해 주세요.");

      const workers = getWorkers();
      const worker = workers.find(w => w.name === workerName);
      const absent = workers.find(w => w.name === absentName);

      if (!worker) throw new Error("본인 이름이 인원목록에 없습니다.");
      if (!absent) throw new Error("휴가자 이름이 인원목록에 없습니다.");
      if (worker.dept !== absent.dept) throw new Error("같은 부서끼리만 대체 가능합니다.");

      const rotation = getRotationForDate(date);
      const dayName = getDayName(date);

      const workerRole = getRoleFromBand(rotation, worker.band);
      const absentRole = getRoleFromBand(rotation, absent.band);

      if (!workerRole || !absentRole) {
        throw new Error("반변경 계산에 실패했습니다.");
      }

      const assignment = resolveAssignment(date, absentRole, workerRole, absenceType);
      const tpl = getTimeTemplate(date, absenceType, assignment.targetRole, assignment.sequenceNo);

      return {
        date,
        dayName,
        dept: worker.dept,
        workerName: worker.name,
        workerBand: worker.band,
        absentName: absent.name,
        absentBand: absent.band,
        absenceType,
        note,
        rotation,
        workerRole,
        absentRole,
        replacementRole: assignment.targetRole,
        sequenceNo: assignment.sequenceNo,
        totalWork: tpl.total,
        overtime: tpl.overtime,
        overtimeHours: tpl.overtimeHours,
        actionText: `${absent.name} ${absenceType}대체`
      };
    }

        reader.onerror = reject;
        reader.readAsDataURL(file);

      const pw = document.getElementById("editPassword").value;
      if (pw !== EDIT_PASSWORD) {
        setMessage("passwordMessage", "비밀번호가 일치하지 않습니다.", "error");
        return;
      }
      closePasswordModal();
      openEditHistoryModal();
    });

    document.getElementById("closeEditHistoryBtn").addEventListener("click", closeEditHistoryModal);

    document.getElementById("loadEditRowsBtn").addEventListener("click", () => {
      const date = document.getElementById("editTargetDate").value;
      if (!date) {
        setMessage("editHistoryMessage", "수정 대상 날짜를 입력해 주세요.", "error");
        return;
      }
      populateEditRows(date);
    });

    document.getElementById("editRowSelect").addEventListener("change", (e) => {
      fillEditFormByIndex(e.target.value);
    });

    document.getElementById("saveEditHistoryBtn").addEventListener("click", () => {
      try {
        const selectedIndex = document.getElementById("editRowSelect").value;
        if (selectedIndex === "") throw new Error("수정할 항목을 선택해 주세요.");

        const date = document.getElementById("editTargetDate").value;
        const workerName = document.getElementById("editWorkerName").value.trim();
        const absentName = document.getElementById("editAbsentName").value.trim();
        const absenceType = document.getElementById("editAbsenceType").value;
        const note = document.getElementById("editNote").value.trim();

        const recalculated = calculateWorkResult({
          date,
          workerName,
          absentName,
          absenceType,
          note
        });

        const history = getHistory();
        history[Number(selectedIndex)] = recalculated;
        setHistory(history);

        populateEditRows(date);
        document.getElementById("editRowSelect").value = String(selectedIndex);
        fillEditFormByIndex(String(selectedIndex));

        if (document.getElementById("historyDate").value === date) {
          renderHistory(date);
        }

        setMessage("editHistoryMessage", "조회결과를 수정했습니다.", "success");
      } catch (e) {
        setMessage("editHistoryMessage", e.message, "error");
      }
    });

    document.getElementById("deleteEditHistoryBtn").addEventListener("click", () => {
      try {
        const selectedIndex = document.getElementById("editRowSelect").value;
        const date = document.getElementById("editTargetDate").value;

        if (selectedIndex === "") throw new Error("삭제할 항목을 선택해 주세요.");

        const history = getHistory();
        history.splice(Number(selectedIndex), 1);
        setHistory(history);

        populateEditRows(date);
        document.getElementById("editWorkerName").value = "";
        document.getElementById("editAbsentName").value = "";
        document.getElementById("editAbsenceType").value = "휴가";
        document.getElementById("editNote").value = "";

        if (document.getElementById("historyDate").value === date) {
          renderHistory(date);
        }

        setMessage("editHistoryMessage", "선택 항목을 삭제했습니다.", "success");
      } catch (e) {
        setMessage("editHistoryMessage", e.message, "error");
      }
    });

    document.getElementById("purchaseModal").addEventListener("click", (e) => {
      if (e.target.id === "purchaseModal") closePurchaseModal();
    });

    document.getElementById("passwordModal").addEventListener("click", (e) => {
      if (e.target.id === "passwordModal") closePasswordModal();
    });

    document.getElementById("editHistoryModal").addEventListener("click", (e) => {
      if (e.target.id === "editHistoryModal") closeEditHistoryModal();
    });

    function init() {
      const savedWorkers = getWorkers();
      if (!savedWorkers.length) {
        setWorkers(defaultWorkers);
      }

      renderWorkerList();
      renderWorkerTable();

      const today = formatDate(new Date());
      document.getElementById("workDate").value = today;
      document.getElementById("historyDate").value = today;
      document.getElementById("purchaseDate").value = today;

      renderHistory(today);
      renderPurchaseHistory();
    }

    init();
  </script>
</body>
</html>
