<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연장근무 관리</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#f5f7fb; margin:0; padding:20px; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }
input, select, button { width:100%; padding:10px; margin-top:5px; }
button { cursor:pointer; }
.btn { background:#2563eb; color:#fff; }
.hidden { display:none; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th,td { border:1px solid #ddd; padding:8px; text-align:center; }
</style>
</head>

<body>

<h2>연장근무 관리</h2>

<div class="card">
<h3>연장근무 입력</h3>

날짜
<input type="date" id="date">

이름
<input list="workers" id="name">
<datalist id="workers"></datalist>

휴가자
<input list="workers" id="absent">

<button class="btn" onclick="calc()">계산</button>

<div id="result"></div>
</div>

<div class="card">
<h3>인원관리</h3>

이름 <input id="newName">
반 
<select id="newBand">
<option>갑</option>
<option>을</option>
<option>병</option>
</select>

부서
<select id="newDept">
<option>제분</option>
<option>정선</option>
<option>대포장</option>
<option>소포장</option>
<option>품질관리</option>
<option>기술</option>
<option>생산2팀</option>
</select>

<button onclick="addWorker()">인원추가</button>
<button onclick="updateList()">업데이트</button>
<button onclick="togglePanel()">숨기기 / 열기</button>

<div id="workerPanel">
<table id="workerTable"></table>
</div>

</div>

<script>

// =====================
// 인원 전체 유지
// =====================
let workers = [
{ name:"김수현", band:"을", dept:"제분" },
{ name:"장진학", band:"병", dept:"제분" },
{ name:"하영기", band:"병", dept:"제분" },
{ name:"박영수", band:"갑", dept:"제분" }
];

// =====================
// 반순서
// =====================
function getRotation(){
return {조근:"을", 중근:"병", 야근:"갑"};
}

// =====================
// 계산
// =====================
function calc(){

const name = document.getElementById("name").value;
const absent = document.getElementById("absent").value;

const me = workers.find(w=>w.name==name);
const ab = workers.find(w=>w.name==absent);

if(!me || !ab){
alert("이름 확인");
return;
}

const rot = getRotation();

let role="";
if(rot.조근==ab.band) role="조근";

let result="";

if(role=="조근"){

if(me.band=="병"){
result="중근 → 07:00~19:00 / 연장 14:00~19:00";
}

if(me.band=="갑"){
result="야근 → 19:00~07:00 / 연장 19:00~22:00";
}

}

document.getElementById("result").innerHTML=result;

}

// =====================
// 인원 추가
// =====================
function addWorker(){

const name=document.getElementById("newName").value;
const band=document.getElementById("newBand").value;
const dept=document.getElementById("newDept").value;

workers.push({name,band,dept});

renderTable();
}

// =====================
// 업데이트
// =====================
function updateList(){
renderList();
alert("반영완료");
}

// =====================
// 리스트
// =====================
function renderList(){

let html="";
workers.forEach(w=>{
html+=`<option value="${w.name}">${w.name}</option>`;
});

document.getElementById("workers").innerHTML=html;
}

// =====================
// 테이블
// =====================
function renderTable(){

let html="<tr><th>이름</th><th>반</th><th>부서</th></tr>";

workers.forEach(w=>{
html+=`<tr>
<td>${w.name}</td>
<td>${w.band}</td>
<td>${w.dept}</td>
</tr>`;
});

document.getElementById("workerTable").innerHTML=html;
}

// =====================
// 전체 숨기기
// =====================
function togglePanel(){

const panel=document.getElementById("workerPanel");

if(panel.style.display=="none"){
panel.style.display="block";
}else{
panel.style.display="none";
}

}

// =====================
renderList();
renderTable();

</script>

</body>
</html>
